<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f1117"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FF5A6E"/>
      <stop offset="100%" stop-color="#8DCAE8"/>
    </linearGradient>
    <linearGradient id="glow" x1="128" y1="128" x2="384" y2="384" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FF5A6E" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#8DCAE8" stop-opacity="0.1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Subtle inner glow -->
  <rect x="32" y="32" width="448" height="448" rx="72" fill="url(#glow)"/>

  <!-- Radar rings -->
  <circle cx="256" cy="256" r="160" stroke="url(#brand)" stroke-width="1" stroke-opacity="0.15" fill="none"/>
  <circle cx="256" cy="256" r="120" stroke="url(#brand)" stroke-width="1" stroke-opacity="0.1" fill="none"/>
  <circle cx="256" cy="256" r="80" stroke="url(#brand)" stroke-width="1" stroke-opacity="0.08" fill="none"/>

  <!-- Scan line (diagonal) -->
  <line x1="256" y1="256" x2="380" y2="160" stroke="url(#brand)" stroke-width="2" stroke-opacity="0.4"/>

  <!-- Network nodes -->
  <circle cx="380" cy="160" r="4" fill="#FF5A6E" opacity="0.8"/>
  <circle cx="170" cy="190" r="3" fill="#8DCAE8" opacity="0.6"/>
  <circle cx="340" cy="340" r="3" fill="#8DCAE8" opacity="0.5"/>
  <circle cx="160" cy="320" r="3.5" fill="#FF5A6E" opacity="0.5"/>

  <!-- Connection lines -->
  <line x1="256" y1="256" x2="170" y2="190" stroke="#8DCAE8" stroke-width="1" stroke-opacity="0.2"/>
  <line x1="256" y1="256" x2="340" y2="340" stroke="#8DCAE8" stroke-width="1" stroke-opacity="0.15"/>
  <line x1="256" y1="256" x2="160" y2="320" stroke="#FF5A6E" stroke-width="1" stroke-opacity="0.15"/>

  <!-- Center dot -->
  <circle cx="256" cy="256" r="6" fill="url(#brand)"/>

  <!-- EN text -->
  <text x="256" y="270" text-anchor="middle" font-family="'SF Mono', 'JetBrains Mono', monospace" font-size="140" font-weight="700" fill="url(#brand)" letter-spacing="-4">
    EN
  </text>
</svg>
